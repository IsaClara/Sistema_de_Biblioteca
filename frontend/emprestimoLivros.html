        <!-- Aqui ficam os itens da direita -->
        <section class="mainDiv">
            <nav class="topBar">
                <div class="perfilTopBar">
                    <a href="pageProfile.html">Camilla Coelho</a>
                    <a href="pageProfile.html"><img src="assets/img/defaultProfile.png" alt="icone"
                            class="img-perfil"></a>
                </div>
            </nav>

            <main>
                <h1>Empréstimos de Livros</h1>
                <div class="registrarEVisualizar">
                    <button class="botaoRegistrar">Registrar novo empréstimo</button>
                    <button class="botaoTabelaGeral" id="btnImprimirGeral">Imprimir tabela geral</button>
                </div>
                <h2>Tabela geral de empréstimo</h2>

                <div class="topoTabela">
                    <div class="controleTabela">
                        <span>Exibir</span>
                        <button class="btnQtd" onclick="mudarLimite(10)">10</button>
                        <button class="btnQtd" onclick="mudarLimite(20)">20</button>
                        <button class="btnQtd" onclick="mudarLimite(30)">30</button>
                        <span>registros</span>
                    </div>
                    <div class="campoBusca">
                        <span class="iconeBusca">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="7"></circle>
                                <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
                            </svg>
                        </span>
                        <input type="search" placeholder="Buscar registro..." id="buscarRegistro">
                    </div>
                </div>

                <!-- Tabela de registros -->
                <table class="tabelaRegistro" id="tabelaEmprestimos">
                    <thead>
                        <tr>
                            <th class="tabelaSuperior">ID</th>
                            <th class="tabelaSuperior">Usuário</th>
                            <th class="tabelaSuperior">Título</th>
                            <th class="tabelaSuperior">Data do empréstimo</th>
                            <th class="tabelaSuperior">Devolução</th>
                            <th class="tabelaSuperior">Quantidade</th>
                            <th class="tabelaSuperior">Situação</th>
                            <th class="tabelaSuperior">Editar</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaUsuarios">
                    </tbody>
                </table>
                <p id="infoTabela" class="infoTabela"></p>
                <div class="paginacao">
                    <button onclick="paginaAnterior()" class="btnQtd">Anterior</button>
                    <span id="paginaAtualTexto">Página 1</span>
                    <button onclick="proximaPagina()" class="btnQtd">Próximo</button>
                </div>
    </div>
    </main>
    </section>

    <!-- popup -->
    <dialog id="popupRegistrar">
        <button class="botaoFechar">X</button>
        <form class="formPopUp" id="formUsuario">
            <span class="campoInteiro">
                <label>Título do livro</label>
                <input type="text" id="inputLivro" list="listaLivros" placeholder="Digite o título" required>
                <datalist id="listaLivros"></datalist>
            </span>

            <span class="campoInteiro">
                <label>Usuário</label>
                <input type="text" id="inputUsuario" list="listaUsuarios" placeholder="Nome ou matrícula" required>
                <datalist id="listaUsuarios"></datalist>
            </span>

            <div class="linha">
                <span>
                    <label>Data do empréstimo</label>
                    <input type="date" id="dataEmprestimo" required>
                </span>
                <span>
                    <label>Data de devolução</label>
                    <input type="date" id="dataDevolucao" required>
                </span>
            </div>

            <div class="linhaFinal">
                <span>
                    <label>Quantidade</label>
                    <input type="number" id="quantidade" min="1" required>
                </span>

                <button class="botaoregistrar" type="submit">
                    Registrar empréstimo
                </button>
            </div>
        </form>
    </dialog>

    <!-- script para emprestimo -->
    <script src="js/emprestimos.js"></script>
    <!-- script para mudar a foto de perfil do user -->
    <script src="js/uploadPerfil.js"></script>
</body>

</html>
