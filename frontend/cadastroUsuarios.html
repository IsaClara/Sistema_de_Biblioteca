<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/telasCadastro.css">

</head>

<body>
    <div class="container">
        <!-- Aqui fica a sideBar -->
        <section class="sideBar">
            <header>
                <h1 class="tituloPaginas">Livros</h1>
                <h2 class="tituloSidebar">Menu</h2>

            <nav>
                <a href="index.html" class="sideBarBotao">

                            <path fill="currentColor"
                                d="M6.5 16q1.175 0 2.288.263T11 17.05V7.2q-1.025-.6-2.175-.9T6.5 6q-.9 0-1.788.175T3 6.7v9.9q.875-.3 1.738-.45T6.5 16m6.5 1.05q1.1-.525 2.213-.787T17.5 16q.9 0 1.763.15T21 16.6V6.7q-.825-.35-1.713-.525T17.5 6q-1.175 0-2.325.3T13 7.2zm-1.662 2.338q-.313-.088-.588-.238q-.975-.575-2.05-.862T6.5 18q-1.05 0-2.062.275T2.5 19.05q-.525.275-1.012-.025T1 18.15V6.1q0-.275.138-.525T1.55 5.2q1.15-.6 2.4-.9T6.5 4q1.45 0 2.838.375T12 5.5q1.275-.75 2.663-1.125T17.5 4q1.3 0 2.55.3t2.4.9q.275.125.413.375T23 6.1v12.05q0 .575-.487.875t-1.013.025q-.925-.5-1.937-.775T17.5 18q-1.125 0-2.2.288t-2.05.862q-.275.15-.587.238t-.663.087t-.663-.088M14 8.776q0-.225.163-.462T14.525 8q.725-.25 1.45-.375T17.5 7.5q.5 0 .988.063t.962.162q.225.05.388.25t.162.45q0 .425-.275.625t-.7.1q-.35-.075-.737-.112T17.5 9q-.65 0-1.275.125t-1.2.325q-.45.175-.737-.025T14 8.775m0 5.5q0-.225.163-.462t.362-.313q.725-.25 1.45-.375T17.5 13q.5 0 .988.063t.962.162q.225.05.388.25t.162.45q0 .425-.275.625t-.7.1q-.35-.075-.737-.112T17.5 14.5q-.65 0-1.275.113t-1.2.312q-.45.175-.737-.012T14 14.275m0-2.75q0-.225.163-.462t.362-.313q.725-.25 1.45-.375t1.525-.125q.5 0 .988.063t.962.162q.225.05.388.25t.162.45q0 .425-.275.625t-.7.1q-.35-.075-.737-.112t-.788-.038q-.65 0-1.275.125t-1.2.325q-.45.175-.737-.025t-.288-.65" />
                        </svg>
                    </span> <span>Todos os livros</span>
                </a>

                <div class="dropDown">
                    <input type="checkbox" id="cadastroToggle" class="dropCheck">
                    <label for="cadastroToggle" class="botaoSideBar">
                        <span class="iconeBotaoSideBar">
                            <svg viewBox="0 0 24 24">
                                <path fill="currentColor"
                                    d="M6 15h7l2-2H6zm0-4h6V9H6zM4 7v10h7l-2 2H2V5h20v3h-2V7zm18.9 5.3q.125.125.125.275t-.125.275l-.9.9L20.25 12l.9-.9q.125-.125.275-.125t.275.125zM13 21v-1.75l6.65-6.65l1.75 1.75L14.75 21z" />
                            </svg>
                        </span>
                        <span class="texto">Cadastro</span>
                        <svg class="seta" viewBox="0 0 24 24">
                            <path fill="currentColor" d="m12 13.2l4.6-4.6L18 10l-6 6l-6-6l1.4-1.4z" />
                        </svg>
                    </label>
                    <ul class="itensEscondidos">
                        <li><a href="#">Usuários</a></li>
                        <li><a href="cadastroEditoras.html">Editoras</a></li>
                    </ul>
                </div>

                <a href="emprestimoLivros.html" class="sideBarBotao">
                    <span class="iconeBotaoSideBar">
                        <svg viewBox="0 0 24 24">
                            <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                                stroke-width="2">
                                <path d="M14 20H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h12v5" />
                                <path d="M11 16H6a2 2 0 0 0-2 2m11-2l3-3l3 3m-3-3v9" />
                            </g>
                        </svg>
                    </span>
                    <span>Empréstimos</span>
                </a>
            </nav>
        </section>


        <!-- Aqui ficam os itens da direita -->
        <section class="mainDiv">
            <nav class="topBar">
                <div class="perfilTopBar">
                    <a href="pageProfile.html">Camilla Coelho</a>
                    <a href="pageProfile.html"><img src="assets/img/defaultProfile.png" alt="icone"
                            class="img-perfil"></a>
                </div>
            </nav>
            <main>
                <h1>Usuários</h1>
                <div class="buscarEregistrar">
                    <div class="campoBusca">
                        <span class="iconeBusca">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="7"></circle>
                                <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
                            </svg>
                        </span>
                        <input type="search" placeholder="Pesquisar usuário..." id="buscarUsuario">
                    </div>
                    <button class="botaoregistrar">Registrar Usuário</button>
                </div>

                <!-- Tabela de registros -->
                <table class="tabelaRegistro">
                    <thead>
                        <tr>
                            <th class="tabelaSuperior">ID</th>
                            <th class="tabelaSuperior">Matricula</th>
                            <th class="tabelaSuperior">Nome</th>
                            <th class="tabelaSuperior">Curso</th>
                            <th class="tabelaSuperior">Telefone</th>
                            <th class="tabelaSuperior">Situação</th>
                            <th class="tabelaSuperior">Editar</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaUsuarios"></tbody>
                </table>

    </div>
    </main>
    </section>
    <dialog id="popupRegistrar">
        <button class="botaoFechar">X</button>
        <form class="formPopUp" id="formUsuario">
            <span class="campoInteiro">
                <label>Nome</label>
                <input placeholder="Digite o nome do usuário..." type="text" id="nomeUsuario" required>
            </span>
            <div class="linha">
                <span>
                    <label>Matricula</label>
                    <input placeholder="Digite a matricula..." type="text" id="matriculaUsuario" required>
                </span>
                <span>
                    <label>Curso</label>
                    <input placeholder="Digite o curso..." type="text" id="cursoUsuario" required>
                </span>
            </div>
            <div class="linhaTelefone">
                <span>
                    <label>Telefone</label>
                    <input placeholder="Digite o telefone..." type="tel" id="telefoneUsuario">
                </span>
                <button class="botaoregistrar" type="submit">Registrar usuário</button>
            </div>
        </form>
    </dialog>


    <!-- script para mudar a foto de perfil do user -->
    <script src="js/uploadPerfil.js"></script>
    <!-- script para configurar a tabela de usuários -->
    <script src="js/usuarios.js"></script>
</body>

</html>
